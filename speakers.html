<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speakers — Once Custom Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#070604;
  --border:#2A2520;
  --bronze:#B08858;
  --cream:#EDE4D5;
  --mid:#B8AFA4;
  --ghost:#1E1A15;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease;}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}
#loader-logo{height:44px;filter:brightness(0) invert(1);opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;}
#loader-logo.show{opacity:1;transform:translateY(0);}
#lbar{position:absolute;bottom:0;left:0;height:1px;background:var(--bronze);width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1);}

/* ── TOPBAR ── */
.bar{position:fixed;top:0;left:0;right:0;z-index:200;height:80px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,6,4,.92);backdrop-filter:blur(20px);}
.bar-back{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:10px;transition:color .2s,gap .2s;}
.bar-back::before{content:'←';font-size:14px;}
.bar-back:hover{color:var(--bronze);gap:14px;}
.bar-logo img{height:40px;filter:brightness(0) invert(1);}
.bar-lang button{background:none;border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;color:var(--mid);cursor:pointer;padding:4px 8px;transition:color .2s;}
.bar-lang button.active{color:var(--cream);}

/* ══════════════════════════════════
   ORBITAL-COVERFLOW SECTION
══════════════════════════════════ */
#coverflow-section{
  position:relative;
  width:100%;
  height:100vh;
  margin-top:80px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* spotlight — smooth radial, no hard triangle */
.cf-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 90% at 50% -20%, rgba(255,248,228,.10) 0%, rgba(220,180,110,.05) 45%, transparent 72%),
    radial-gradient(ellipse 80% 60% at 50% 38%, rgba(176,136,88,.04) 0%, transparent 65%),
    radial-gradient(ellipse 40% 12% at 50% 106%, rgba(176,136,88,.05) 0%, transparent 60%);
  pointer-events:none;
}

/* header */
.cf-header{
  position:absolute;top:48px;left:60px;
  z-index:10;
}
.cf-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,4vw,52px);
  letter-spacing:.1em;color:var(--cream);line-height:1;
}
.cf-sub{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ghost);margin-top:6px;}

/* ── 3D SCENE ── */
.cf-scene{
  position:relative;
  width:100%;
  height:56vh;
  perspective:1100px;
  display:flex;align-items:center;justify-content:center;
}

/* the ring that rotates */
.cf-ring{
  position:relative;
  width:1px;height:1px;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
}

/* each item sits on the ring via rotateY + translateZ */
.cf-item{
  position:absolute;
  width:240px;height:360px;
  left:-120px;top:-180px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transform-style:preserve-3d;
  /* opacity & filter controlled by JS based on angle */
  transition:opacity .9s ease, filter .9s ease;
}
.cf-item img{
  width:100%;height:100%;
  object-fit:contain;
  pointer-events:none;
  display:block;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,.9));
  transition:filter .9s ease;
}
.cf-item.cf-active img{
  filter:drop-shadow(0 14px 40px rgba(0,0,0,1)) drop-shadow(0 0 30px rgba(176,136,88,.18));
  animation:cf-float 6s ease-in-out infinite;
}
@keyframes cf-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* floor glow */
.cf-floor{
  position:absolute;bottom:2%;left:50%;
  transform:translateX(-50%);
  width:180px;height:22px;
  background:radial-gradient(ellipse at center, rgba(176,136,88,.16) 0%, transparent 70%);
  filter:blur(7px);pointer-events:none;
}

/* ── INFO ── */
.cf-info{
  position:relative;z-index:10;
  text-align:center;margin-top:20px;
  pointer-events:none;min-height:100px;
  padding:16px 40px 0;
  background:radial-gradient(ellipse 70% 100% at 50% 50%, rgba(7,6,4,.5) 0%, transparent 100%);
}
.cf-info-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,8vw,96px);
  letter-spacing:.08em;color:var(--cream);line-height:1;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}
.cf-info-tag{
  font-size:13px;font-weight:300;font-style:italic;
  letter-spacing:.14em;color:var(--bronze);margin-top:8px;
  opacity:.9;
}
.cf-info-hint{
  font-size:10px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mid);margin-top:14px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.cf-info-hint::before,.cf-info-hint::after{content:'';display:block;width:20px;height:1px;background:var(--border);}

/* ── NAV ── */
.cf-nav{
  position:relative;z-index:10;
  display:flex;align-items:center;gap:32px;
  margin-top:20px;
}
.cf-btn{
  width:48px;height:48px;background:transparent;
  border:1px solid var(--border);color:var(--mid);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s;
}
.cf-btn:hover{border-color:var(--bronze);color:var(--cream);}
.cf-counter{display:none;}

/* ══════════════════════════════════
   SLIDER DETAIL SECTION
══════════════════════════════════ */
#hero-section{
  position:relative;
  height:100vh;
  overflow:hidden;
}
#slides{position:absolute;inset:0;}

.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;
  overflow:hidden;
  transition:transform .9s cubic-bezier(.77,0,.18,1),opacity .9s ease;
}
.slide.prev{transform:translateY(-100%);opacity:0;pointer-events:none;}
.slide.active{transform:translateY(0);opacity:1;}
.slide.next{transform:translateY(100%);opacity:0;pointer-events:none;}

.slide-bg{
  position:absolute;inset:0;
}
.slide-bg-inner{
  position:absolute;inset:0;
}

.slide-ghost{display:none;}

/* ── LEFT: museum caption panel ── */
.slide-content{
  position:relative;z-index:3;
  padding:0 0 0 72px;
  width:46%;
  height:100%;
  display:flex;align-items:center;
}
.slide-left{
  width:100%;
  border-left:1px solid rgba(176,136,88,.25);
  padding-left:32px;
}

.slide-index{ display:none; }

/* artist name — large, minimal */
.slide-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,7vw,96px);
  letter-spacing:.12em;line-height:1;
  color:var(--cream);
  transform:translateY(20px);opacity:0;
  transition:transform .85s cubic-bezier(.22,1,.36,1) .1s,opacity .85s ease .1s;
}
.slide.active .slide-name{transform:translateY(0);opacity:1;}

/* medium line — "Once Custom Sound, Istanbul" */
.slide-maker{
  font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--bronze);opacity:.8;
  margin-top:8px;
  transform:translateY(14px);opacity:0;
  transition:transform .8s ease .18s,opacity .8s ease .18s;
}
.slide.active .slide-maker{transform:translateY(0);opacity:.8;}

/* tagline — italic subtitle */
.slide-tagline{
  font-size:12px;font-weight:300;font-style:italic;
  letter-spacing:.08em;line-height:1.8;
  color:rgba(237,228,213,.55);
  margin-top:6px;
  transform:translateY(14px);opacity:0;
  transition:transform .8s ease .25s,opacity .8s ease .25s;
}
.slide.active .slide-tagline{transform:translateY(0);opacity:1;}

/* divider */
.slide-divider{
  width:32px;height:1px;
  background:rgba(176,136,88,.4);
  margin:24px 0;
  transform:scaleX(0);transform-origin:left;opacity:0;
  transition:transform .7s ease .3s,opacity .7s ease .3s;
}
.slide.active .slide-divider{transform:scaleX(1);opacity:1;}

/* spec list — caption style */
.slide-specs{
  display:flex;flex-direction:column;
  transform:translateY(12px);opacity:0;
  transition:transform .8s ease .36s,opacity .8s ease .36s;
}
.slide.active .slide-specs{transform:translateY(0);opacity:1;}
.spec-row{
  display:flex;flex-direction:column;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.spec-row:first-child{border-top:1px solid rgba(255,255,255,.06);}
.spec-label{
  font-size:8px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--bronze);margin-bottom:3px;
}
.spec-val{
  font-size:12px;letter-spacing:.04em;font-weight:300;
  color:rgba(237,228,213,.9);
}

/* enquire — discreet museum shop link */
.slide-cta{
  margin-top:28px;
  transform:translateY(8px);opacity:0;
  transition:transform .8s ease .5s,opacity .8s ease .5s;
}
.slide.active .slide-cta{transform:translateY(0);opacity:1;}
.cta-btn{
  display:inline-flex;align-items:center;gap:10px;
  font-size:8px;font-weight:400;letter-spacing:.32em;text-transform:uppercase;
  color:rgba(237,228,213,.5);text-decoration:none;
  border-bottom:1px solid rgba(176,136,88,.35);
  padding-bottom:5px;
  transition:color .25s,gap .25s,border-color .25s;
}
.cta-btn:hover{color:var(--bronze);gap:18px;border-color:var(--bronze);}
.cta-btn::after{content:'→';}

/* ── RIGHT: cinematic product — full slide, image on right half ── */
.slide-right{
  position:absolute;
  inset:0;
  overflow:hidden;
  z-index:1;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:4vw;
}
/* gradient covers left half completely — no seam */
.slide-right::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(to right,
    var(--black) 0%,
    var(--black) 36%,
    rgba(7,6,4,.85) 50%,
    rgba(7,6,4,.3) 65%,
    transparent 80%);
  z-index:4;pointer-events:none;
}
.slide-right::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 80% at 55% 46%,
    rgba(176,136,88,.05) 0%, transparent 70%);
  pointer-events:none;z-index:1;
}

.gallery-frame{ display:contents; }

.gallery-main{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.gallery-main-img{
  height:86vh;width:auto;max-width:90%;
  object-fit:contain;display:block;
  filter:drop-shadow(0 24px 60px rgba(0,0,0,.8));
  transform:translateX(30px);opacity:0;
  transition:transform 1.2s cubic-bezier(.22,1,.36,1) .1s, opacity 1.2s ease .1s;
}
.slide.active .gallery-main-img{transform:translateX(0);opacity:1;}
.slide.active .gallery-main-img:not(.fading){animation:float-art 10s ease-in-out infinite .6s;}
@keyframes float-art{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.gallery-main-img.fading{opacity:0!important;transform:scale(.97)!important;animation:none!important;}

/* thumbnail strip */
.gallery-thumbs{
  position:absolute;
  bottom:28px;right:0;left:0;
  display:flex;flex-direction:row;align-items:center;justify-content:center;
  gap:8px;z-index:10;pointer-events:auto;
}
.gallery-thumb{
  width:44px;height:44px;
  border:1px solid rgba(176,136,88,.25);
  cursor:pointer;overflow:hidden;background:rgba(12,9,5,.85);
  transition:border-color .2s,transform .2s;flex-shrink:0;
}
.gallery-thumb:hover{border-color:rgba(176,136,88,.7);transform:scale(1.08);}
.gallery-thumb.active{border-color:var(--bronze);box-shadow:0 0 10px rgba(176,136,88,.3);}
.gallery-thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.gallery-count{display:none;}
.slide-stage-shadow{display:none;}

/* back to coverflow button */
.back-to-orbit{
  position:absolute;top:104px;left:48px;z-index:10;
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mid);cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:color .2s,gap .2s;
  text-decoration:none;
}
.back-to-orbit::before{content:'↑';font-size:14px;}
.back-to-orbit:hover{color:var(--bronze);gap:14px;}

/* slider controls */
.nav-arr{
  position:absolute;right:48px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:8px;
}
.arr-btn{
  width:44px;height:44px;background:rgba(7,6,4,.7);
  border:1px solid var(--border);color:var(--mid);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s;
}
.arr-btn:hover{border-color:var(--bronze);color:var(--cream);}
.arr-btn:disabled{opacity:.2;cursor:default;pointer-events:none;}
.dots{display:none;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .3s,transform .3s;}
.dot.active{background:var(--bronze);transform:scale(1.6);}
.counter{display:none !important;}
.counter em{color:var(--bronze);font-style:normal;}
.progress{position:absolute;left:0;bottom:0;right:0;z-index:10;height:2px;background:var(--border);}
.progress-fill{height:100%;background:var(--bronze);transition:width .6s cubic-bezier(.4,0,.2,1);}

/* lang */
[data-lang]{display:none;}
body.en [data-lang="en"],body.tr [data-lang="tr"]{display:inline;}
</style>
</head>

var N = products.length;
var cfCurrent = 0;
var cfAnimating = false;
var sliderCurrent = 0;
var sliderAnimating = false;
var lang = 'tr';

document.getElementById('cfTot').textContent = String(N).padStart(2,'0');
/* cTot removed from HTML */

/* ── BUILD ORBITAL RING ITEMS ── */
var cfRing = document.getElementById('cfRing');
var cfItems = [];
var RING_R = 520;          /* translateZ radius */
var ANGLE_STEP = 360 / N;
var FADE_DEG = 65;         /* degrees from front before fading out */

products.forEach(function(p, i){
  var item = document.createElement('div');
  item.className = 'cf-item';
  item.dataset.index = i;
  /* fixed position on the ring */
  item.style.transform = 'rotateY(' + (i * ANGLE_STEP) + 'deg) translateZ(' + RING_R + 'px)';
  item.innerHTML = '<img src="' + (p.gallery ? p.gallery[0] : p.img) + '" alt="' + p.name + '" loading="' + (i < 4 ? 'eager' : 'lazy') + '">';

  item.addEventListener('click', function(){
    var idx = parseInt(this.dataset.index);
    if(idx === cfCurrent){ goToDetail(idx); }
    else { cfGoTo(idx); }
  });

  cfRing.appendChild(item);
  cfItems.push(item);
});

function cfRender(){
  /* rotate ring so current item faces front */
  cfRing.style.transform = 'rotateY(' + (-cfCurrent * ANGLE_STEP) + 'deg)';

  cfItems.forEach(function(item, i){
    /* compute angle difference from front, wrap to -180..180 */
    var diff = ((i - cfCurrent) * ANGLE_STEP % 360 + 540) % 360 - 180;
    var absDiff = Math.abs(diff);

    if(absDiff > FADE_DEG + 20){
      /* behind — invisible */
      item.style.opacity = '0';
      item.style.pointerEvents = 'none';
    } else if(absDiff > FADE_DEG){
      /* soft fade zone */
      var t = 1 - (absDiff - FADE_DEG) / 20;
      item.style.opacity = String(t * 0.15);
      item.style.pointerEvents = 'none';
    } else {
      /* visible — opacity and brightness fall off with angle */
      var t = 1 - absDiff / FADE_DEG;
      item.style.opacity = String(0.18 + t * 0.82);
      item.style.pointerEvents = 'auto';
    }

    item.classList.toggle('cf-active', i === cfCurrent);
  });

  var p = products[cfCurrent];
  document.getElementById('cfName').textContent = p.name;
  document.getElementById('cfTag').innerHTML =
    '<span data-lang="en">' + p.tagline.en + '</span><span data-lang="tr">' + p.tagline.tr + '</span>';
  document.getElementById('cfCur').textContent = String(cfCurrent + 1).padStart(2,'0');
  applyLang();
}

function cfGo(dir){
  if(cfAnimating) return;
  cfCurrent = (cfCurrent + dir + N) % N;
  cfAnimating = true; cfRender();
  setTimeout(function(){ cfAnimating = false; }, 1050);
}
function cfGoTo(idx){
  if(cfAnimating || idx === cfCurrent) return;
  cfCurrent = idx;
  cfAnimating = true; cfRender();
  setTimeout(function(){ cfAnimating = false; }, 1050);
}

/* drag / swipe */
var cfDragStartX = null;
var cfScene = document.getElementById('cfScene');
cfScene.addEventListener('mousedown', function(e){ cfDragStartX = e.clientX; });
cfScene.addEventListener('mouseup', function(e){
  if(cfDragStartX === null) return;
  var dx = e.clientX - cfDragStartX;
  if(Math.abs(dx) > 40){ cfGo(dx < 0 ? 1 : -1); }
  cfDragStartX = null;
});
cfScene.addEventListener('touchstart', function(e){ cfDragStartX = e.touches[0].clientX; }, {passive:true});
cfScene.addEventListener('touchend', function(e){
  if(cfDragStartX === null) return;
  var dx = e.changedTouches[0].clientX - cfDragStartX;
  if(Math.abs(dx) > 40){ cfGo(dx < 0 ? 1 : -1); }
  cfDragStartX = null;
}, {passive:true});

/* ── BUILD SLIDES ── */
var slidesWrap = document.getElementById('slides');
var dotsWrap = document.getElementById('dotsWrap');

products.forEach(function(p, i){
  var gallery = p.gallery || [p.img];
  var thumbsHtml = '';
  if(gallery.length > 1){
    gallery.forEach(function(url, gi){
      thumbsHtml += '<div class="gallery-thumb'+(gi===0?' active':'')+'" data-slide="'+i+'" data-gi="'+gi+'">' +
        '<img src="'+url+'" alt="" loading="lazy"></div>';
    });
    thumbsHtml += '<div class="gallery-count">'+gallery.length+'</div>';
  }

  var s = document.createElement('div');
  s.className = 'slide ' + (i === 0 ? 'active' : 'next');
  s.innerHTML =
    '<div class="slide-bg"><div class="slide-bg-inner" style="background:' + bgGradients[i] + ';position:absolute;inset:0;"></div></div>' +
    '<div class="slide-ghost">' + String(i+1).padStart(2,'0') + '</div>' +
    '<div class="slide-content">' +
      '<div class="slide-left">' +
        '<div class="slide-name">' + p.name + '</div>' +
        '<div class="slide-maker">Once Custom Sound</div>' +
        '<div class="slide-tagline">' +
          '<span data-lang="en">' + p.tagline.en + '</span>' +
          '<span data-lang="tr">' + p.tagline.tr + '</span>' +
        '</div>' +
        '<div class="slide-divider"></div>' +
        '<div class="slide-specs">' +
          p.specs.map(function(sp){ return '<div class="spec-row"><span class="spec-label">' + sp.l + '</span><span class="spec-val">' + sp.v + '</span></div>'; }).join('') +
        '</div>' +
        '<div class="slide-cta">' +
          '<a href="mailto:info@oncecustom.com?subject=Enquiry: ' + p.name + '" class="cta-btn">' +
            '<span data-lang="en">Enquire</span><span data-lang="tr">Bilgi Al</span>' +
          '</a>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="slide-right">' +
      '<div class="gallery-frame">' +
        '<div class="gallery-main">' +
          '<img class="gallery-main-img" src="'+gallery[0]+'" alt="'+p.name+'" loading="'+(i<2?'eager':'lazy')+'">' +
        '</div>' +
        '<div class="gallery-floor"></div>' +
      '</div>' +
      '<div class="gallery-thumbs">'+thumbsHtml+'</div>' +
    '</div>';
  slidesWrap.appendChild(s);

  var d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = (function(idx){ return function(){ goTo(idx); }; })(i);
  dotsWrap.appendChild(d);
});

/* ── GALLERY THUMB CLICK ── */
document.getElementById('slides').addEventListener('click', function(e){
  var thumb = e.target.closest('.gallery-thumb');
  if(!thumb) return;
  var si = parseInt(thumb.dataset.slide);
  var gi = parseInt(thumb.dataset.gi);
  var gallery = products[si].gallery || [products[si].img];
  var slide = document.querySelectorAll('.slide')[si];
  var mainImg = slide.querySelector('.gallery-main-img');
  var thumbs = slide.querySelectorAll('.gallery-thumb');
  mainImg.classList.add('fading');
  setTimeout(function(){ mainImg.src = gallery[gi]; mainImg.classList.remove('fading'); }, 260);
  thumbs.forEach(function(t){ t.classList.remove('active'); });
  thumb.classList.add('active');
});

function goToDetail(idx){
  sliderCurrent = idx;
  sliderRender();
  document.getElementById('hero-section').scrollIntoView({behavior:'smooth'});
}

function sliderRender(){
  document.querySelectorAll('.slide').forEach(function(s, i){
    s.className = 'slide ' + (i < sliderCurrent ? 'prev' : i === sliderCurrent ? 'active' : 'next');
  });
  document.querySelectorAll('.dot').forEach(function(d, i){ d.classList.toggle('active', i === sliderCurrent); });
  /* cCur removed from HTML */
  document.getElementById('progFill').style.width = ((sliderCurrent + 1) / N * 100) + '%';
  document.getElementById('btnUp').disabled = sliderCurrent === 0;
  document.getElementById('btnDown').disabled = sliderCurrent === N - 1;
  applyLang();
}

function go(dir){
  if(sliderAnimating) return;
  var n = sliderCurrent + dir;
  if(n < 0 || n >= N) return;
  sliderAnimating = true; sliderCurrent = n; sliderRender();
  setTimeout(function(){ sliderAnimating = false; }, 960);
}
function goTo(idx){
  if(sliderAnimating || idx === sliderCurrent) return;
  sliderAnimating = true; sliderCurrent = idx; sliderRender();
  setTimeout(function(){ sliderAnimating = false; }, 960);
}

/* wheel in hero */
var wheelLock = false;
window.addEventListener('wheel', function(e){
  var hero = document.getElementById('hero-section');
  var rect = hero.getBoundingClientRect();
  if(rect.top > -10 && rect.bottom >= window.innerHeight * .8){
    if(wheelLock) return;
    if(Math.abs(e.deltaY) < 40) return;
    if(e.deltaY > 0 && sliderCurrent === N-1) return;
    if(e.deltaY < 0 && sliderCurrent === 0) return;
    e.preventDefault();
    wheelLock = true; go(e.deltaY > 0 ? 1 : -1);
    setTimeout(function(){ wheelLock = false; }, 1600);
  }
}, {passive:false});

/* wheel on coverflow — advance carousel */
var cfWheelLock = false;
window.addEventListener('wheel', function(e){
  var cf = document.getElementById('coverflow-section');
  var rect = cf.getBoundingClientRect();
  if(rect.top > -10 && rect.bottom >= window.innerHeight * .9){
    if(cfWheelLock) return;
    cfWheelLock = true;
    cfGo(e.deltaY > 0 ? 1 : -1);
    setTimeout(function(){ cfWheelLock = false; }, 900);
  }
}, {passive:true});

/* touch slide in hero */
var touchY = null;
window.addEventListener('touchstart', function(e){ touchY = e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', function(e){
  if(touchY === null) return;
  var dy = touchY - e.changedTouches[0].clientY;
  var hero = document.getElementById('hero-section');
  var rect = hero.getBoundingClientRect();
  if(rect.top > -10 && Math.abs(dy) > 40){ go(dy > 0 ? 1 : -1); }
  touchY = null;
}, {passive:true});

/* keyboard */
window.addEventListener('keydown', function(e){
  var cf = document.getElementById('coverflow-section');
  var hero = document.getElementById('hero-section');
  var cfRect = cf.getBoundingClientRect();
  var heroRect = hero.getBoundingClientRect();
  if(cfRect.top > -200 && cfRect.bottom > 200){
    if(e.key === 'ArrowRight') cfGo(1);
    if(e.key === 'ArrowLeft') cfGo(-1);
    if(e.key === 'Enter') goToDetail(cfCurrent);
  } else if(heroRect.top > -200){
    if(e.key === 'ArrowDown') go(1);
    if(e.key === 'ArrowUp') go(-1);
  }
});

/* lang */
function applyLang(){
  document.querySelectorAll('[data-lang]').forEach(function(el){
    el.style.display = el.dataset.lang === lang ? 'inline' : 'none';
  });
}
function setLang(l){
  lang = l; document.body.className = l;
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  document.getElementById('btnTR').classList.toggle('active', l === 'tr');
  localStorage.setItem('once_lang', l); applyLang();
}
setLang(localStorage.getItem('once_lang') || 'en');

/* loader */
window.addEventListener('DOMContentLoaded', function(){
  var logo = document.getElementById('loader-logo');
  var bar = document.getElementById('lbar');
  setTimeout(function(){ logo.classList.add('show'); }, 100);
  setTimeout(function(){ bar.style.width = '100%'; }, 200);
  setTimeout(function(){
    document.getElementById('loader').classList.add('out');
    cfRender();
    sliderRender();
  }, 1700);
});
</script>
