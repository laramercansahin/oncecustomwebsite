<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speakers — Once Custom Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#070604;
  --border:#2A2520;
  --bronze:#B08858;
  --cream:#EDE4D5;
  --mid:#B8AFA4;
  --ghost:#1E1A15;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease;}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}
#loader-logo{height:44px;filter:brightness(0) invert(1);opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;}
#loader-logo.show{opacity:1;transform:translateY(0);}
#lbar{position:absolute;bottom:0;left:0;height:1px;background:var(--bronze);width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1);}

/* ── TOPBAR ── */
.bar{position:fixed;top:0;left:0;right:0;z-index:200;height:80px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,6,4,.92);backdrop-filter:blur(20px);}
.bar-back{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:10px;transition:color .2s,gap .2s;}
.bar-back::before{content:'←';font-size:14px;}
.bar-back:hover{color:var(--bronze);gap:14px;}
.bar-logo img{height:40px;filter:brightness(0) invert(1);}
.bar-lang button{background:none;border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;color:var(--mid);cursor:pointer;padding:4px 8px;transition:color .2s;}
.bar-lang button.active{color:var(--cream);}

/* ══════════════════════════════════
   ORBITAL-COVERFLOW SECTION
══════════════════════════════════ */
#coverflow-section{
  position:relative;
  width:100%;
  height:100vh;
  margin-top:80px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* spotlight — smooth radial, no hard triangle */
.cf-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 55% 90% at 50% -20%, rgba(255,248,228,.10) 0%, rgba(220,180,110,.05) 45%, transparent 72%),
    radial-gradient(ellipse 80% 60% at 50% 38%, rgba(176,136,88,.04) 0%, transparent 65%),
    radial-gradient(ellipse 40% 12% at 50% 106%, rgba(176,136,88,.05) 0%, transparent 60%);
  pointer-events:none;
}

/* header */
.cf-header{
  position:absolute;top:48px;left:60px;
  z-index:10;
}
.cf-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,4vw,52px);
  letter-spacing:.1em;color:var(--cream);line-height:1;
}
.cf-sub{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ghost);margin-top:6px;}

/* ── 3D SCENE ── */
.cf-scene{
  position:relative;
  width:100%;
  height:56vh;
  perspective:1100px;
  display:flex;align-items:center;justify-content:center;
}

/* the ring that rotates */
.cf-ring{
  position:relative;
  width:1px;height:1px;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.4,0,.2,1);
}

/* each item sits on the ring via rotateY + translateZ */
.cf-item{
  position:absolute;
  width:240px;height:360px;
  left:-120px;top:-180px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transform-style:preserve-3d;
  /* opacity & filter controlled by JS based on angle */
  transition:opacity .9s ease, filter .9s ease;
}
.cf-item img{
  width:100%;height:100%;
  object-fit:contain;
  pointer-events:none;
  display:block;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,.9));
  transition:filter .9s ease;
}
.cf-item.cf-active img{
  filter:drop-shadow(0 14px 40px rgba(0,0,0,1)) drop-shadow(0 0 30px rgba(176,136,88,.18));
  animation:cf-float 6s ease-in-out infinite;
}
@keyframes cf-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* floor glow */
.cf-floor{
  position:absolute;bottom:2%;left:50%;
  transform:translateX(-50%);
  width:180px;height:22px;
  background:radial-gradient(ellipse at center, rgba(176,136,88,.16) 0%, transparent 70%);
  filter:blur(7px);pointer-events:none;
}

/* ── INFO ── */
.cf-info{
  position:relative;z-index:10;
  text-align:center;margin-top:20px;
  pointer-events:none;min-height:100px;
  padding:16px 40px 0;
  background:radial-gradient(ellipse 70% 100% at 50% 50%, rgba(7,6,4,.5) 0%, transparent 100%);
}
.cf-info-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,8vw,96px);
  letter-spacing:.08em;color:var(--cream);line-height:1;
  text-shadow:0 2px 20px rgba(0,0,0,.8);
}
.cf-info-tag{
  font-size:13px;font-weight:300;font-style:italic;
  letter-spacing:.14em;color:var(--bronze);margin-top:8px;
  opacity:.9;
}
.cf-info-hint{
  font-size:10px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--mid);margin-top:14px;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.cf-info-hint::before,.cf-info-hint::after{content:'';display:block;width:20px;height:1px;background:var(--border);}

/* ── NAV ── */
.cf-nav{
  position:relative;z-index:10;
  display:flex;align-items:center;gap:32px;
  margin-top:20px;
}
.cf-btn{
  width:48px;height:48px;background:transparent;
  border:1px solid var(--border);color:var(--mid);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s;
}
.cf-btn:hover{border-color:var(--bronze);color:var(--cream);}
.cf-counter{
  font-family:'Bebas Neue',sans-serif;font-size:13px;
  letter-spacing:.2em;color:var(--ghost);min-width:60px;text-align:center;
}
.cf-counter em{color:var(--bronze);font-style:normal;}

/* ══════════════════════════════════
   SLIDER DETAIL SECTION
══════════════════════════════════ */
#hero-section{
  position:relative;
  height:100vh;
  overflow:hidden;
}
#slides{position:absolute;inset:0;}

.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;
  overflow:hidden;
  transition:transform .9s cubic-bezier(.77,0,.18,1),opacity .9s ease;
}
.slide.prev{transform:translateY(-100%);opacity:0;pointer-events:none;}
.slide.active{transform:translateY(0);opacity:1;}
.slide.next{transform:translateY(100%);opacity:0;pointer-events:none;}

.slide-bg{
  position:absolute;inset:0;
}
.slide-bg-inner{
  position:absolute;inset:0;
}

.slide-ghost{
  position:absolute;right:-.04em;bottom:-.12em;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(200px,30vw,400px);
  line-height:1;letter-spacing:-.02em;
  color:rgba(255,255,255,.025);
  pointer-events:none;user-select:none;
}

.slide-content{
  position:relative;z-index:2;
  padding:0 0 0 80px;width:100%;
  display:flex;align-items:center;
  height:100%;
}
.slide-left{
  width:48%;min-width:300px;
  flex-shrink:0;
  position:relative;z-index:3;
}
.slide-index{
  font-size:10px;letter-spacing:.32em;color:var(--bronze);
  margin-bottom:18px;
  display:flex;align-items:center;gap:14px;
}
.slide-index::before{content:'';display:block;width:24px;height:1px;background:var(--bronze);}
.slide-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(80px,13vw,172px);
  letter-spacing:.04em;line-height:.88;color:var(--cream);
  transform:translateY(24px);opacity:0;
  transition:transform .85s cubic-bezier(.22,1,.36,1) .1s,opacity .85s ease .1s;
}
.slide.active .slide-name{transform:translateY(0);opacity:1;}
.slide-tagline{
  font-size:13px;font-weight:200;font-style:italic;
  letter-spacing:.12em;line-height:2.2;color:var(--mid);
  margin-top:22px;border-left:1px solid rgba(176,136,88,.5);padding-left:18px;
  transform:translateY(16px);opacity:0;
  transition:transform .8s ease .28s,opacity .8s ease .28s;
}
.slide.active .slide-tagline{transform:translateY(0);opacity:1;}
.slide-specs{
  display:flex;flex-direction:column;margin-top:32px;
  transform:translateY(14px);opacity:0;
  transition:transform .8s ease .38s,opacity .8s ease .38s;
}
.slide.active .slide-specs{transform:translateY(0);opacity:1;}
.spec-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.spec-row:first-child{border-top:1px solid var(--border);}
.spec-label{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ghost);}
.spec-val{font-size:11px;letter-spacing:.08em;color:var(--mid);}
.slide-cta{
  margin-top:30px;
  transform:translateY(10px);opacity:0;
  transition:transform .8s ease .48s,opacity .8s ease .48s;
}
.slide.active .slide-cta{transform:translateY(0);opacity:1;}
.cta-btn{
  display:inline-flex;align-items:center;gap:14px;
  font-size:10px;font-weight:400;letter-spacing:.24em;text-transform:uppercase;
  color:var(--bronze);text-decoration:none;border:1px solid var(--bronze);
  padding:13px 26px;transition:background .22s,color .22s,gap .22s;
}
.cta-btn:hover{background:var(--bronze);color:var(--black);gap:20px;}
.cta-btn::after{content:'→';}

/* right side: full-bleed artistic product image, no box */
.slide-right{
  position:absolute;
  right:0;top:0;bottom:0;
  width:52%;
  display:flex;align-items:center;justify-content:flex-end;
  pointer-events:none;
  overflow:hidden;
}
/* left edge fade so it merges with text side */
.slide-right::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:220px;
  background:linear-gradient(to right, var(--black) 0%, transparent 100%);
  z-index:2;pointer-events:none;
}
.slide-stage{
  position:relative;
  height:90vh;
  width:auto;
  display:flex;align-items:center;justify-content:center;
  transform:translateX(40px);opacity:0;
  transition:transform 1.1s cubic-bezier(.22,1,.36,1) .1s, opacity 1.1s ease .1s;
}
.slide.active .slide-stage{transform:translateX(0);opacity:1;}
.slide.active .slide-stage-img{animation:float-stage 8s ease-in-out infinite .6s;}
@keyframes float-stage{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-18px);}
}
.slide-stage-img{
  height:88vh;
  width:auto;
  max-width:none;
  object-fit:contain;
  filter:drop-shadow(-20px 0 60px rgba(7,6,4,.9)) drop-shadow(0 20px 40px rgba(0,0,0,.6));
}
.slide-stage-shadow{display:none;}

/* back to coverflow button */
.back-to-orbit{
  position:absolute;top:104px;left:48px;z-index:10;
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mid);cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:color .2s,gap .2s;
  text-decoration:none;
}
.back-to-orbit::before{content:'↑';font-size:14px;}
.back-to-orbit:hover{color:var(--bronze);gap:14px;}

/* slider controls */
.nav-arr{
  position:absolute;right:48px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:8px;
}
.arr-btn{
  width:44px;height:44px;background:rgba(7,6,4,.7);
  border:1px solid var(--border);color:var(--mid);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s;
}
.arr-btn:hover{border-color:var(--bronze);color:var(--cream);}
.arr-btn:disabled{opacity:.2;cursor:default;pointer-events:none;}
.dots{
  position:absolute;left:40px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:16px;
}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .3s,transform .3s;}
.dot.active{background:var(--bronze);transform:scale(1.6);}
.counter{
  position:absolute;bottom:24px;left:48px;z-index:10;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.2em;color:var(--ghost);
}
.counter em{color:var(--bronze);font-style:normal;}
.progress{position:absolute;left:0;bottom:0;right:0;z-index:10;height:2px;background:var(--border);}
.progress-fill{height:100%;background:var(--bronze);transition:width .6s cubic-bezier(.4,0,.2,1);}

/* lang */
[data-lang]{display:none;}
body.en [data-lang="en"],body.tr [data-lang="tr"]{display:inline;}
</style>
</head>

  <div id="lbar"></div>

<header class="bar">
  <a href="index.html" class="bar-back">
    <span data-lang="en">Home</span><span data-lang="tr">Ana Sayfa</span>
  </a>
  <div class="bar-logo"><img src="https://www.oncecustom.com/images/logo.png" alt="Once Custom Sound"></div>

    <button id="btnEN" onclick="setLang('en')">EN</button>

</header>

<!-- ORBITAL-COVERFLOW CATALOG -->
<section id="coverflow-section">
  <div class="cf-bg"></div>
  <div class="cf-header">
    <div class="cf-title"><span data-lang="en">The Collection</span><span data-lang="tr">Koleksiyon</span></div>
    <div class="cf-sub"><span data-lang="en">Rotate · Click to discover</span><span data-lang="tr">Döndür · Tıkla keşfet</span></div>
  </div>

  <div class="cf-scene" id="cfScene">
    <div class="cf-ring" id="cfRing"></div>
    <div class="cf-floor"></div>
  </div>

  <div class="cf-info">
    <div class="cf-info-name" id="cfName"></div>
    <div class="cf-info-tag" id="cfTag"></div>

      <span data-lang="en">click to explore</span>
      <span data-lang="tr">keşfetmek için tıkla</span>
    </div>
  </div>

  <div class="cf-nav">
    <button class="cf-btn" id="cfPrev" onclick="cfGo(-1)">←</button>
    <div class="cf-counter"><em id="cfCur">01</em> / <span id="cfTot"></span></div>
    <button class="cf-btn" id="cfNext" onclick="cfGo(1)">→</button>
  </div>
</section>

<!-- DETAIL SLIDER -->
<section id="hero-section">
  <a href="#coverflow-section" class="back-to-orbit">
    <span data-lang="en">Back to collection</span>
    <span data-lang="tr">Koleksiyona dön</span>
  </a>
  <div id="slides"></div>
  <div class="nav-arr">
    <button class="arr-btn" id="btnUp" onclick="go(-1)">↑</button>
    <button class="arr-btn" id="btnDown" onclick="go(1)">↓</button>
  </div>
  <div class="dots" id="dotsWrap"></div>
  <div class="counter"><em id="cCur">01</em> / <span id="cTot">11</span></div>
  <div class="progress"><div class="progress-fill" id="progFill"></div></div>
</section>

<script>
var bgGradients = [
  'radial-gradient(ellipse at 60% 40%,#1C1208 0%,#0D0A05 50%,#070604 100%)',
  'radial-gradient(ellipse at 65% 45%,#180E09 0%,#0C0705 50%,#070604 100%)',
  'radial-gradient(ellipse at 55% 50%,#080F0E 0%,#060808 50%,#070604 100%)',
  'radial-gradient(ellipse at 68% 38%,#1A1207 0%,#0E0A04 50%,#070604 100%)',
  'radial-gradient(ellipse at 62% 42%,#170D0B 0%,#0C0706 50%,#070604 100%)',
  'radial-gradient(ellipse at 70% 50%,#10100C 0%,#090906 50%,#070604 100%)',
  'radial-gradient(ellipse at 60% 44%,#12110D 0%,#0A0906 50%,#070604 100%)',
  'radial-gradient(ellipse at 65% 40%,#1A1309 0%,#0E0A05 50%,#070604 100%)',
  'radial-gradient(ellipse at 63% 42%,#1E1008 0%,#0E0704 50%,#070604 100%)',
  'radial-gradient(ellipse at 68% 45%,#150D14 0%,#0A0609 50%,#070604 100%)',
  'radial-gradient(ellipse at 58% 48%,#090F0D 0%,#060807 50%,#070604 100%)',
];

var products = [
  {name:'HAR',    tagline:{en:'a sculpture in sound',tr:'seste bir heykel'},
   specs:[{l:'Type',v:'Full-range horn'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'98 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/Har_2025-v2.png'},
  {name:'NAR',    tagline:{en:'pomegranate — abundant sound',tr:'nar — bereketli ses'},
   specs:[{l:'Type',v:'Stand-mount, full-range'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'90 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/nar1-v2.jpg'},
  {name:'SU',     tagline:{en:'water — source of all things',tr:'su — her şeyin kaynağı'},
   specs:[{l:'Type',v:'Desktop, full-range'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'88 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/su1-v2.jpg'},
  {name:'ALMULA', tagline:{en:'apple — tradition & memory',tr:'elma — gelenek & bellek'},
   specs:[{l:'Type',v:'Pendant / ceiling'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'88 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/almula1-v2_2.jpg'},
  {name:'RAN',    tagline:{en:'illuminated — born from light',tr:'aydınlanmış — ışıktan doğan'},
   specs:[{l:'Type',v:'Stand-mount, 2-way'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'87 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/ran-v2.png'},
  {name:'DAL',    tagline:{en:'branch — defying gravity',tr:'dal — yerçekimine meydan okuyan'},
   specs:[{l:'Type',v:'Pendant / ceiling'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'89 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/once-custom0009_Dal-v2.png'},
  {name:'ALİ',    tagline:{en:'compact and resolute',tr:'kompakt ve kararlı'},
   specs:[{l:'Type',v:'Desktop, 2-way'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'86 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/ali-v2.jpg'},
  {name:'LARA',   tagline:{en:'form as presence',tr:'form bir varlık olarak'},
   specs:[{l:'Type',v:'Desktop, full-range'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'87 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/lara_3-v2.jpg'},
  {name:'NAR A+', tagline:{en:'the signature edition',tr:'imza edisyonu'},
   specs:[{l:'Type',v:'Stand-mount, full-range'},{l:'Driver',v:'ScanSpeak Reference'},{l:'Sensitivity',v:'91 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/Nar_Act_2025-v3.png'},
  {name:'DAL A+', tagline:{en:'premium pendant edition',tr:'premium sarkıt edisyonu'},
   specs:[{l:'Type',v:'Pendant / ceiling, upgraded'},{l:'Driver',v:'ScanSpeak Reference'},{l:'Sensitivity',v:'90 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/once-custom0009_Dal_Purple-v2_1.png'},
  {name:'SU 2',   tagline:{en:'the evolution of the original',tr:'orijinalin evrimi'},
   specs:[{l:'Type',v:'Desktop, 2-way evolved'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'89 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/Su_2-v3.png'},
];

var N = products.length;
var cfCurrent = 0;
var cfAnimating = false;
var sliderCurrent = 0;
var sliderAnimating = false;
var lang = 'tr';

document.getElementById('cfTot').textContent = String(N).padStart(2,'0');
document.getElementById('cTot').textContent = String(N).padStart(2,'0');

/* ── BUILD ORBITAL RING ITEMS ── */
var cfRing = document.getElementById('cfRing');
var cfItems = [];
var RING_R = 520;          /* translateZ radius */
var ANGLE_STEP = 360 / N;
var FADE_DEG = 65;         /* degrees from front before fading out */

products.forEach(function(p, i){
  var item = document.createElement('div');
  item.className = 'cf-item';
  item.dataset.index = i;
  /* fixed position on the ring */
  item.style.transform = 'rotateY(' + (i * ANGLE_STEP) + 'deg) translateZ(' + RING_R + 'px)';
  item.innerHTML = '<img src="' + p.img + '" alt="' + p.name + '" loading="' + (i < 4 ? 'eager' : 'lazy') + '">';

  item.addEventListener('click', function(){
    var idx = parseInt(this.dataset.index);
    if(idx === cfCurrent){ goToDetail(idx); }
    else { cfGoTo(idx); }
  });

  cfRing.appendChild(item);
  cfItems.push(item);
});

function cfRender(){
  /* rotate ring so current item faces front */
  cfRing.style.transform = 'rotateY(' + (-cfCurrent * ANGLE_STEP) + 'deg)';

  cfItems.forEach(function(item, i){
    /* compute angle difference from front, wrap to -180..180 */
    var diff = ((i - cfCurrent) * ANGLE_STEP % 360 + 540) % 360 - 180;
    var absDiff = Math.abs(diff);

    if(absDiff > FADE_DEG + 20){
      /* behind — invisible */
      item.style.opacity = '0';
      item.style.pointerEvents = 'none';
    } else if(absDiff > FADE_DEG){
      /* soft fade zone */
      var t = 1 - (absDiff - FADE_DEG) / 20;
      item.style.opacity = String(t * 0.15);
      item.style.pointerEvents = 'none';
    } else {
      /* visible — opacity and brightness fall off with angle */
      var t = 1 - absDiff / FADE_DEG;
      item.style.opacity = String(0.18 + t * 0.82);
      item.style.pointerEvents = 'auto';
    }

    item.classList.toggle('cf-active', i === cfCurrent);
  });

  var p = products[cfCurrent];
  document.getElementById('cfName').textContent = p.name;
  document.getElementById('cfTag').innerHTML =
    '<span data-lang="en">' + p.tagline.en + '</span><span data-lang="tr">' + p.tagline.tr + '</span>';
  document.getElementById('cfCur').textContent = String(cfCurrent + 1).padStart(2,'0');
  applyLang();
}

function cfGo(dir){
  if(cfAnimating) return;
  cfCurrent = (cfCurrent + dir + N) % N;
  cfAnimating = true; cfRender();
  setTimeout(function(){ cfAnimating = false; }, 1050);
}
function cfGoTo(idx){
  if(cfAnimating || idx === cfCurrent) return;
  cfCurrent = idx;
  cfAnimating = true; cfRender();
  setTimeout(function(){ cfAnimating = false; }, 1050);
}

/* drag / swipe */
var cfDragStartX = null;
var cfScene = document.getElementById('cfScene');
cfScene.addEventListener('mousedown', function(e){ cfDragStartX = e.clientX; });
cfScene.addEventListener('mouseup', function(e){
  if(cfDragStartX === null) return;
  var dx = e.clientX - cfDragStartX;
  if(Math.abs(dx) > 40){ cfGo(dx < 0 ? 1 : -1); }
  cfDragStartX = null;
});
cfScene.addEventListener('touchstart', function(e){ cfDragStartX = e.touches[0].clientX; }, {passive:true});
cfScene.addEventListener('touchend', function(e){
  if(cfDragStartX === null) return;
  var dx = e.changedTouches[0].clientX - cfDragStartX;
  if(Math.abs(dx) > 40){ cfGo(dx < 0 ? 1 : -1); }
  cfDragStartX = null;
}, {passive:true});

/* ── BUILD SLIDES ── */
var slidesWrap = document.getElementById('slides');
var dotsWrap = document.getElementById('dotsWrap');

products.forEach(function(p, i){
  var s = document.createElement('div');
  s.className = 'slide ' + (i === 0 ? 'active' : 'next');
  s.innerHTML =
    '<div class="slide-bg"><div class="slide-bg-inner" style="background:' + bgGradients[i] + ';position:absolute;inset:0;"></div></div>' +
    '<div class="slide-ghost">' + String(i+1).padStart(2,'0') + '</div>' +
    '<div class="slide-content">' +
      '<div class="slide-left">' +
        '<div class="slide-index">' + String(i+1).padStart(2,'0') + ' &nbsp;·&nbsp; Once Custom Sound</div>' +
        '<div class="slide-name">' + p.name + '</div>' +
        '<div class="slide-tagline">' +
          '<span data-lang="en">' + p.tagline.en + '</span>' +
          '<span data-lang="tr">' + p.tagline.tr + '</span>' +
        '</div>' +
        '<div class="slide-specs">' +
          p.specs.map(function(sp){ return '<div class="spec-row"><span class="spec-label">' + sp.l + '</span><span class="spec-val">' + sp.v + '</span></div>'; }).join('') +
        '</div>' +
        '<div class="slide-cta">' +
          '<a href="mailto:info@oncecustom.com?subject=Enquiry: ' + p.name + '" class="cta-btn">' +
            '<span data-lang="en">Enquire</span><span data-lang="tr">Bilgi Al</span>' +
          '</a>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="slide-right">' +
      '<div class="slide-stage">' +
        '<img class="slide-stage-img" src="' + p.img + '" alt="' + p.name + '" loading="' + (i < 2 ? 'eager' : 'lazy') + '">' +
      '</div>' +
    '</div>';
  slidesWrap.appendChild(s);

  var d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = (function(idx){ return function(){ goTo(idx); }; })(i);
  dotsWrap.appendChild(d);
});

function goToDetail(idx){
  sliderCurrent = idx;
  sliderRender();
  document.getElementById('hero-section').scrollIntoView({behavior:'smooth'});
}

function sliderRender(){
  document.querySelectorAll('.slide').forEach(function(s, i){
    s.className = 'slide ' + (i < sliderCurrent ? 'prev' : i === sliderCurrent ? 'active' : 'next');
  });
  document.querySelectorAll('.dot').forEach(function(d, i){ d.classList.toggle('active', i === sliderCurrent); });
  document.getElementById('cCur').textContent = String(sliderCurrent + 1).padStart(2,'0');
  document.getElementById('progFill').style.width = ((sliderCurrent + 1) / N * 100) + '%';
  document.getElementById('btnUp').disabled = sliderCurrent === 0;
  document.getElementById('btnDown').disabled = sliderCurrent === N - 1;
  applyLang();
}

function go(dir){
  if(sliderAnimating) return;
  var n = sliderCurrent + dir;
  if(n < 0 || n >= N) return;
  sliderAnimating = true; sliderCurrent = n; sliderRender();
  setTimeout(function(){ sliderAnimating = false; }, 960);
}
function goTo(idx){
  if(sliderAnimating || idx === sliderCurrent) return;
  sliderAnimating = true; sliderCurrent = idx; sliderRender();
  setTimeout(function(){ sliderAnimating = false; }, 960);
}

/* wheel in hero */
var wheelLock = false;
window.addEventListener('wheel', function(e){
  var hero = document.getElementById('hero-section');
  var rect = hero.getBoundingClientRect();
  if(rect.top > -10 && rect.bottom >= window.innerHeight * .8){
    if(wheelLock) return;
    if(e.deltaY > 0 && sliderCurrent === N-1) return;
    if(e.deltaY < 0 && sliderCurrent === 0) return;
    e.preventDefault();
    wheelLock = true; go(e.deltaY > 0 ? 1 : -1);
    setTimeout(function(){ wheelLock = false; }, 1100);
  }
}, {passive:false});

/* wheel on coverflow — advance carousel */
var cfWheelLock = false;
window.addEventListener('wheel', function(e){
  var cf = document.getElementById('coverflow-section');
  var rect = cf.getBoundingClientRect();
  if(rect.top > -10 && rect.bottom >= window.innerHeight * .9){
    if(cfWheelLock) return;
    cfWheelLock = true;
    cfGo(e.deltaY > 0 ? 1 : -1);
    setTimeout(function(){ cfWheelLock = false; }, 900);
  }
}, {passive:true});

/* touch slide in hero */
var touchY = null;
window.addEventListener('touchstart', function(e){ touchY = e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', function(e){
  if(touchY === null) return;
  var dy = touchY - e.changedTouches[0].clientY;
  var hero = document.getElementById('hero-section');
  var rect = hero.getBoundingClientRect();
  if(rect.top > -10 && Math.abs(dy) > 40){ go(dy > 0 ? 1 : -1); }
  touchY = null;
}, {passive:true});

/* keyboard */
window.addEventListener('keydown', function(e){
  var cf = document.getElementById('coverflow-section');
  var hero = document.getElementById('hero-section');
  var cfRect = cf.getBoundingClientRect();
  var heroRect = hero.getBoundingClientRect();
  if(cfRect.top > -200 && cfRect.bottom > 200){
    if(e.key === 'ArrowRight') cfGo(1);
    if(e.key === 'ArrowLeft') cfGo(-1);
    if(e.key === 'Enter') goToDetail(cfCurrent);
  } else if(heroRect.top > -200){
    if(e.key === 'ArrowDown') go(1);
    if(e.key === 'ArrowUp') go(-1);
  }
});

/* lang */
function applyLang(){
  document.querySelectorAll('[data-lang]').forEach(function(el){
    el.style.display = el.dataset.lang === lang ? 'inline' : 'none';
  });
}
function setLang(l){
  lang = l; document.body.className = l;
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  document.getElementById('btnTR').classList.toggle('active', l === 'tr');
  localStorage.setItem('once_lang', l); applyLang();
}
setLang(localStorage.getItem('once_lang') || 'en');

/* loader */
window.addEventListener('DOMContentLoaded', function(){
  var logo = document.getElementById('loader-logo');
  var bar = document.getElementById('lbar');
  setTimeout(function(){ logo.classList.add('show'); }, 100);
  setTimeout(function(){ bar.style.width = '100%'; }, 200);
  setTimeout(function(){
    document.getElementById('loader').classList.add('out');
    cfRender();
    sliderRender();
  }, 1700);
});
</script>
</body>
</html>
