<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speakers — Once Custom Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#070604;
  --border:#2A2520;
  --bronze:#B08858;
  --cream:#EDE4D5;
  --mid:#B8AFA4;
  --ghost:#1E1A15;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease;}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}
#loader img{height:44px;filter:brightness(0) invert(1);opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;}
#loader img.show{opacity:1;transform:translateY(0);}
#lbar{position:absolute;bottom:0;left:0;height:1px;background:var(--bronze);width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1);}

/* ── TOPBAR ── */
.bar{position:fixed;top:0;left:0;right:0;z-index:200;height:80px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,6,4,.92);backdrop-filter:blur(20px);}
.bar-back{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:10px;transition:color .2s,gap .2s;}
.bar-back::before{content:'←';font-size:14px;}
.bar-back:hover{color:var(--bronze);gap:14px;}
.bar-logo img{height:40px;filter:brightness(0) invert(1);}
.bar-lang button{background:none;border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;color:var(--mid);cursor:pointer;padding:4px 8px;transition:color .2s;}
.bar-lang button.active{color:var(--cream);}

/* ══════════════════════════════════
   SECTION 1 — GRID OVERVIEW
══════════════════════════════════ */
#grid-section{
  background:var(--black);
  padding:120px 60px 100px;
  margin-top:80px;
}
.grid-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:72px;
}
.grid-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(36px,5vw,64px);
  letter-spacing:.08em;color:var(--cream);
}
.grid-sub{
  font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--ghost);
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--border);
}
.grid-card{
  position:relative;
  aspect-ratio:3/4;
  overflow:hidden;
  cursor:pointer;
  background:#0A0806;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* floating product image */
.gc-img-wrap{
  position:relative;
  width:80%;
  height:72%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1;
  animation:float 5s ease-in-out infinite;
  transition:transform .6s cubic-bezier(.22,1,.36,1);
}
/* stagger float timing per card */
.grid-card:nth-child(2) .gc-img-wrap{animation-delay:-1.3s;}
.grid-card:nth-child(3) .gc-img-wrap{animation-delay:-2.6s;}
.grid-card:nth-child(4) .gc-img-wrap{animation-delay:-0.8s;}
.grid-card:nth-child(5) .gc-img-wrap{animation-delay:-1.9s;}
.grid-card:nth-child(6) .gc-img-wrap{animation-delay:-3.1s;}
.grid-card:nth-child(7) .gc-img-wrap{animation-delay:-0.5s;}
.grid-card:nth-child(8) .gc-img-wrap{animation-delay:-2.2s;}
.grid-card:nth-child(9) .gc-img-wrap{animation-delay:-3.7s;}
.grid-card:nth-child(10) .gc-img-wrap{animation-delay:-1.1s;}
.grid-card:nth-child(11) .gc-img-wrap{animation-delay:-2.8s;}

@keyframes float{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
}

.gc-img-wrap::after{
  content:'';
  position:absolute;
  bottom:-16px;left:15%;right:15%;
  height:20px;
  background:radial-gradient(ellipse at center,rgba(176,136,88,.35) 0%,transparent 70%);
  filter:blur(6px);
  animation:shadow-pulse 5s ease-in-out infinite;
  transition:opacity .4s ease;
}
.grid-card:nth-child(2) .gc-img-wrap::after{animation-delay:-1.3s;}
.grid-card:nth-child(3) .gc-img-wrap::after{animation-delay:-2.6s;}
.grid-card:nth-child(4) .gc-img-wrap::after{animation-delay:-0.8s;}
.grid-card:nth-child(5) .gc-img-wrap::after{animation-delay:-1.9s;}
.grid-card:nth-child(6) .gc-img-wrap::after{animation-delay:-3.1s;}
.grid-card:nth-child(7) .gc-img-wrap::after{animation-delay:-0.5s;}
.grid-card:nth-child(8) .gc-img-wrap::after{animation-delay:-2.2s;}
.grid-card:nth-child(9) .gc-img-wrap::after{animation-delay:-3.7s;}
.grid-card:nth-child(10) .gc-img-wrap::after{animation-delay:-1.1s;}
.grid-card:nth-child(11) .gc-img-wrap::after{animation-delay:-2.8s;}

@keyframes shadow-pulse{
  0%,100%{transform:scaleX(1);opacity:.6;}
  50%{transform:scaleX(.65);opacity:.25;}
}

.gc-img{
  width:100%;height:100%;
  object-fit:contain;
  /* removes white background on dark card via multiply blend */
  mix-blend-mode:multiply;
  filter:brightness(1.08) contrast(1.05);
  transition:filter .5s ease, transform .5s ease;
}
.grid-card:hover .gc-img-wrap{
  animation-play-state:paused;
  transform:translateY(-14px) scale(1.04);
}
.grid-card:hover .gc-img{
  filter:brightness(1.12) contrast(1.08);
}
.grid-card:hover .gc-img-wrap::after{
  opacity:0;
}

/* ambient glow on hover */
.gc-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,rgba(176,136,88,.08) 0%,transparent 65%);
  opacity:0;
  transition:opacity .5s ease;
  pointer-events:none;
}
.grid-card:hover .gc-glow{opacity:1;}

/* top corner number */
.gc-num{
  position:absolute;top:16px;left:20px;z-index:3;
  font-size:10px;letter-spacing:.26em;color:var(--bronze);
  opacity:0;transition:opacity .3s ease;
}
.grid-card:hover .gc-num{opacity:1;}

/* bottom info overlay */
.gc-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(7,6,4,.96) 0%,rgba(7,6,4,.2) 50%,transparent 100%);
  opacity:0;transition:opacity .4s ease;
  pointer-events:none;
}
.grid-card:hover .gc-overlay{opacity:1;}

.gc-info{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  padding:28px 24px;
  transform:translateY(10px);opacity:0;
  transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .4s ease;
}
.grid-card:hover .gc-info{transform:translateY(0);opacity:1;}
.gc-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:30px;letter-spacing:.14em;
  color:var(--cream);line-height:1;margin-bottom:5px;
}
.gc-tag{
  font-size:11px;font-weight:200;font-style:italic;
  letter-spacing:.08em;color:var(--mid);line-height:1.7;
}

/* ══════════════════════════════════
   SECTION 2 — CINEMATIC SLIDER
══════════════════════════════════ */
#hero-section{
  position:relative;
  height:100vh;
  overflow:hidden;
}
#slides{position:absolute;inset:0;}

.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;
  overflow:hidden;
  transition:transform .9s cubic-bezier(.77,0,.18,1),opacity .9s ease;
}
.slide.prev{transform:translateY(-100%);opacity:0;pointer-events:none;}
.slide.active{transform:translateY(0);opacity:1;}
.slide.next{transform:translateY(100%);opacity:0;pointer-events:none;}

/* abstract gradient bg — no local photos needed */
.slide-bg{
  position:absolute;inset:0;
  overflow:hidden;
}
.slide-bg-gradient{
  position:absolute;inset:0;
  transition:opacity 1s ease;
}
/* subtle blurred product silhouette in background */
.slide-bg-ghost{
  position:absolute;
  right:-5%;bottom:-10%;
  width:70%;
  opacity:.045;
  filter:blur(40px) grayscale(100%);
  transform:scale(1.3);
  pointer-events:none;
}

.slide-ghost{
  position:absolute;right:-.05em;bottom:-.15em;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(180px,28vw,360px);
  line-height:1;letter-spacing:-.02em;
  color:rgba(255,255,255,.03);
  pointer-events:none;user-select:none;
}

.slide-content{
  position:relative;z-index:2;
  padding:0 80px;width:100%;
  display:grid;grid-template-columns:1fr 1fr;
  gap:80px;align-items:center;
}
.slide-index{font-size:11px;letter-spacing:.3em;color:var(--bronze);margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.slide-index::before{content:'';display:block;width:28px;height:1px;background:var(--bronze);}
.slide-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(72px,12vw,160px);
  letter-spacing:.06em;line-height:.9;color:var(--cream);
  transform:translateY(20px);opacity:0;
  transition:transform .8s cubic-bezier(.22,1,.36,1) .1s,opacity .8s ease .1s;
}
.slide.active .slide-name{transform:translateY(0);opacity:1;}
.slide-tagline{
  font-size:14px;font-weight:200;font-style:italic;
  letter-spacing:.1em;line-height:2.2;color:var(--mid);
  margin-top:20px;border-left:1px solid var(--bronze);padding-left:20px;
  transform:translateY(16px);opacity:0;
  transition:transform .8s ease .25s,opacity .8s ease .25s;
}
.slide.active .slide-tagline{transform:translateY(0);opacity:1;}
.slide-specs{
  display:flex;flex-direction:column;
  margin-top:36px;
  transform:translateY(16px);opacity:0;
  transition:transform .8s ease .35s,opacity .8s ease .35s;
}
.slide.active .slide-specs{transform:translateY(0);opacity:1;}
.spec-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.spec-row:first-child{border-top:1px solid var(--border);}
.spec-label{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ghost);}
.spec-val{font-size:12px;letter-spacing:.08em;color:var(--mid);}
.slide-cta{
  margin-top:32px;
  transform:translateY(12px);opacity:0;
  transition:transform .8s ease .45s,opacity .8s ease .45s;
}
.slide.active .slide-cta{transform:translateY(0);opacity:1;}
.cta-btn{
  display:inline-flex;align-items:center;gap:14px;
  font-size:11px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;
  color:var(--bronze);text-decoration:none;border:1px solid var(--bronze);
  padding:14px 28px;transition:background .2s,color .2s,gap .2s;
}
.cta-btn:hover{background:var(--bronze);color:var(--black);gap:22px;}
.cta-btn::after{content:'→';}

/* floating product in slider */
.slide-right{
  display:flex;align-items:center;justify-content:center;
}
.slide-img-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  width:85%;max-height:62vh;
}
.slide-img-wrap::after{
  content:'';
  position:absolute;
  bottom:-28px;left:10%;right:10%;
  height:30px;
  background:radial-gradient(ellipse at center,rgba(176,136,88,.4) 0%,transparent 70%);
  filter:blur(8px);
}
.slide.active .slide-img-wrap{
  animation:float-slide 6s ease-in-out infinite .8s;
}
@keyframes float-slide{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-14px);}
}
.slide-img{
  max-height:60vh;max-width:100%;object-fit:contain;
  mix-blend-mode:multiply;
  filter:brightness(1.06) drop-shadow(0 0 0 transparent);
  transform:translateY(24px) scale(.96);opacity:0;
  transition:transform 1s cubic-bezier(.22,1,.36,1) .15s,opacity 1s ease .15s;
}
.slide.active .slide-img{transform:translateY(0) scale(1);opacity:1;}

/* hero controls */
.nav-arr{
  position:absolute;right:48px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:8px;
}
.arr-btn{
  width:44px;height:44px;background:rgba(7,6,4,.7);
  border:1px solid var(--border);color:var(--mid);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s;
}
.arr-btn:hover{border-color:var(--bronze);color:var(--cream);}
.arr-btn:disabled{opacity:.2;cursor:default;pointer-events:none;}

.dots{
  position:absolute;left:48px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:14px;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--border);cursor:pointer;
  transition:background .3s,transform .3s;
}
.dot.active{background:var(--bronze);transform:scale(1.5);}

.counter{
  position:absolute;bottom:24px;left:48px;z-index:10;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.2em;color:var(--ghost);
}
.counter em{color:var(--bronze);font-style:normal;}

.progress{position:absolute;left:0;bottom:0;right:0;z-index:10;height:2px;background:var(--border);}
.progress-fill{height:100%;background:var(--bronze);transition:width .6s cubic-bezier(.4,0,.2,1);}

/* lang */
[data-lang]{display:none;}
body.en [data-lang="en"],body.tr [data-lang="tr"]{display:inline;}
</style>
</head>
<body class="tr">

<!-- LOADER -->
<div id="loader">
  <img src="https://www.oncecustom.com/images/logo.png" id="limg" alt="">
  <div id="lbar"></div>
</div>

<!-- TOPBAR -->
<header class="bar">
  <a href="index.html" class="bar-back">
    <span data-lang="en">Home</span><span data-lang="tr">Ana Sayfa</span>
  </a>
  <div class="bar-logo"><img src="https://www.oncecustom.com/images/logo.png" alt="Once Custom Sound"></div>
  <div class="bar-lang">
    <button id="btnEN" onclick="setLang('en')">EN</button>
    <span style="color:var(--border);font-size:11px">|</span>
    <button id="btnTR" onclick="setLang('tr')" class="active">TR</button>
  </div>
</header>

<!-- SECTION 1: GRID -->
<div id="grid-section">
  <div class="grid-header">
    <div class="grid-title">
      <span data-lang="en">The Collection</span>
      <span data-lang="tr">Koleksiyon</span>
    </div>
    <div class="grid-sub">
      <span data-lang="en">Different forms · One philosophy</span>
      <span data-lang="tr">Farklı formlar · Tek felsefe</span>
    </div>
  </div>
  <div class="grid" id="gridWrap"></div>
</div>

<!-- SECTION 2: SLIDER -->
<div id="hero-section">
  <div id="slides"></div>
  <div class="nav-arr">
    <button class="arr-btn" id="btnUp" onclick="go(-1)">↑</button>
    <button class="arr-btn" id="btnDown" onclick="go(1)">↓</button>
  </div>
  <div class="dots" id="dotsWrap"></div>
  <div class="counter"><em id="cCur">01</em> / <span id="cTot">11</span></div>
  <div class="progress"><div class="progress-fill" id="progFill"></div></div>
</div>

<script>
/* Per-product atmospheric gradients — no local photos needed */
var bgGradients = [
  /* HAR  */ 'radial-gradient(ellipse at 70% 40%,#1a1008 0%,#0a0704 45%,#070604 100%)',
  /* NAR  */ 'radial-gradient(ellipse at 65% 45%,#140c08 0%,#090604 45%,#070604 100%)',
  /* SU   */ 'radial-gradient(ellipse at 60% 50%,#08100f 0%,#060808 45%,#070604 100%)',
  /* ALMULA */ 'radial-gradient(ellipse at 70% 38%,#150e06 0%,#0a0703 45%,#070604 100%)',
  /* RAN  */ 'radial-gradient(ellipse at 65% 42%,#130c0a 0%,#090605 45%,#070604 100%)',
  /* DAL  */ 'radial-gradient(ellipse at 70% 50%,#0d0c0a 0%,#080705 45%,#070604 100%)',
  /* ALİ  */ 'radial-gradient(ellipse at 62% 44%,#0f0e0a 0%,#080705 45%,#070604 100%)',
  /* LARA */ 'radial-gradient(ellipse at 68% 40%,#140f08 0%,#0a0804 45%,#070604 100%)',
  /* NAR A+ */ 'radial-gradient(ellipse at 65% 42%,#180e07 0%,#0b0603 45%,#070604 100%)',
  /* DAL A+ */ 'radial-gradient(ellipse at 70% 45%,#130b10 0%,#090508 45%,#070604 100%)',
  /* SU 2 */ 'radial-gradient(ellipse at 62% 48%,#090f0e 0%,#060807 45%,#070604 100%)',
];

var products = [
  {
    name:'HAR',
    tagline:{en:'a sculpture in sound',tr:'seste bir heykel'},
    specs:[{l:'Type',v:'Full-range horn'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'98 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/Har_2025-v2.png',
  },
  {
    name:'NAR',
    tagline:{en:'pomegranate — abundant sound',tr:'nar — bereketli ses'},
    specs:[{l:'Type',v:'Stand-mount, full-range'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'90 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/nar1-v2.jpg',
  },
  {
    name:'SU',
    tagline:{en:'water — source of all things',tr:'su — her şeyin kaynağı'},
    specs:[{l:'Type',v:'Desktop, full-range'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'88 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/su1-v2.jpg',
  },
  {
    name:'ALMULA',
    tagline:{en:'apple — tradition & memory',tr:'elma — gelenek & bellek'},
    specs:[{l:'Type',v:'Pendant / ceiling'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'88 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/almula1-v2_2.jpg',
  },
  {
    name:'RAN',
    tagline:{en:'illuminated — born from light',tr:'aydınlanmış — ışıktan doğan'},
    specs:[{l:'Type',v:'Stand-mount, 2-way'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'87 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/ran-v2.png',
  },
  {
    name:'DAL',
    tagline:{en:'branch — defying gravity',tr:'dal — yerçekimine meydan okuyan'},
    specs:[{l:'Type',v:'Pendant / ceiling'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'89 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/once-custom0009_Dal-v2.png',
  },
  {
    name:'ALİ',
    tagline:{en:'compact and resolute',tr:'kompakt ve kararlı'},
    specs:[{l:'Type',v:'Desktop, 2-way'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'86 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/ali-v2.jpg',
  },
  {
    name:'LARA',
    tagline:{en:'form as presence',tr:'form bir varlık olarak'},
    specs:[{l:'Type',v:'Desktop, full-range'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'87 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/lara_3-v2.jpg',
  },
  {
    name:'NAR A+',
    tagline:{en:'the signature edition',tr:'imza edisyonu'},
    specs:[{l:'Type',v:'Stand-mount, full-range'},{l:'Driver',v:'ScanSpeak Reference'},{l:'Sensitivity',v:'91 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/Nar_Act_2025-v3.png',
  },
  {
    name:'DAL A+',
    tagline:{en:'premium pendant edition',tr:'premium sarkıt edisyonu'},
    specs:[{l:'Type',v:'Pendant / ceiling, upgraded'},{l:'Driver',v:'ScanSpeak Reference'},{l:'Sensitivity',v:'90 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/once-custom0009_Dal_Purple-v2_1.png',
  },
  {
    name:'SU 2',
    tagline:{en:'the evolution of the original',tr:'orijinalin evrimi'},
    specs:[{l:'Type',v:'Desktop, 2-way evolved'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'89 dB'},{l:'Origin',v:'Istanbul, handmade'}],
    img:'https://www.oncecustom.com/images/urun/kare/Su_2-v3.png',
  },
];

var current=0, isAnimating=false, lang='tr';
var slidesWrap=document.getElementById('slides');
var dotsWrap=document.getElementById('dotsWrap');
var gridWrap=document.getElementById('gridWrap');

products.forEach(function(p,i){
  /* ── SLIDE ── */
  var s=document.createElement('div');
  s.className='slide '+(i===0?'active':'next');
  s.innerHTML=`
    <div class="slide-bg">
      <div class="slide-bg-gradient" style="background:${bgGradients[i]};position:absolute;inset:0;"></div>
      <img class="slide-bg-ghost" src="${p.img}" alt="" aria-hidden="true">
    </div>
    <div class="slide-ghost">${String(i+1).padStart(2,'0')}</div>
    <div class="slide-content">
      <div class="slide-left">
        <div class="slide-index">${String(i+1).padStart(2,'0')} &nbsp;·&nbsp; Once Custom Sound</div>
        <div class="slide-name">${p.name}</div>
        <div class="slide-tagline">
          <span data-lang="en">${p.tagline.en}</span>
          <span data-lang="tr">${p.tagline.tr}</span>
        </div>
        <div class="slide-specs">
          ${p.specs.map(sp=>`<div class="spec-row"><span class="spec-label">${sp.l}</span><span class="spec-val">${sp.v}</span></div>`).join('')}
        </div>
        <div class="slide-cta">
          <a href="mailto:info@oncecustom.com?subject=Enquiry: ${p.name}" class="cta-btn">
            <span data-lang="en">Enquire</span><span data-lang="tr">Bilgi Al</span>
          </a>
        </div>
      </div>
      <div class="slide-right">
        <div class="slide-img-wrap">
          <img class="slide-img" src="${p.img}" alt="${p.name}" loading="${i<2?'eager':'lazy'}">
        </div>
      </div>
    </div>`;
  slidesWrap.appendChild(s);

  /* ── DOT ── */
  var d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.onclick=(function(idx){return function(){goTo(idx);};})(i);
  dotsWrap.appendChild(d);

  /* ── GRID CARD ── */
  var c=document.createElement('div');
  c.className='grid-card';
  c.onclick=(function(idx){return function(){
    document.getElementById('hero-section').scrollIntoView({behavior:'smooth'});
    setTimeout(function(){goTo(idx);},400);
  };})(i);
  c.innerHTML=`
    <div class="gc-glow"></div>
    <div class="gc-img-wrap">
      <img class="gc-img" src="${p.img}" alt="${p.name}" loading="lazy">
    </div>
    <div class="gc-overlay"></div>
    <div class="gc-num">${String(i+1).padStart(2,'0')}</div>
    <div class="gc-info">
      <div class="gc-name">${p.name}</div>
      <div class="gc-tag"><span data-lang="en">${p.tagline.en}</span><span data-lang="tr">${p.tagline.tr}</span></div>
    </div>`;
  gridWrap.appendChild(c);
});

document.getElementById('cTot').textContent=String(products.length).padStart(2,'0');

function render(){
  document.querySelectorAll('.slide').forEach(function(s,i){
    s.className='slide '+(i<current?'prev':i===current?'active':'next');
  });
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('active',i===current);});
  document.getElementById('cCur').textContent=String(current+1).padStart(2,'0');
  document.getElementById('progFill').style.width=((current+1)/products.length*100)+'%';
  document.getElementById('btnUp').disabled=current===0;
  document.getElementById('btnDown').disabled=current===products.length-1;
  applyLang();
}

function go(dir){
  if(isAnimating)return;
  var n=current+dir;
  if(n<0||n>=products.length)return;
  isAnimating=true;current=n;render();
  setTimeout(function(){isAnimating=false;},950);
}
function goTo(idx){
  if(isAnimating||idx===current)return;
  isAnimating=true;current=idx;render();
  setTimeout(function(){isAnimating=false;},950);
}

var wheelLock=false;
window.addEventListener('wheel',function(e){
  var hero=document.getElementById('hero-section');
  var rect=hero.getBoundingClientRect();
  if(rect.top>-10&&rect.bottom>=window.innerHeight*.8){
    if(wheelLock)return;
    if(e.deltaY>0&&current===products.length-1)return;
    if(e.deltaY<0&&current===0)return;
    e.preventDefault();
    wheelLock=true;
    go(e.deltaY>0?1:-1);
    setTimeout(function(){wheelLock=false;},1100);
  }
},{passive:false});

var touchY=null;
window.addEventListener('touchstart',function(e){touchY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',function(e){
  if(touchY===null)return;
  var dy=touchY-e.changedTouches[0].clientY;
  var hero=document.getElementById('hero-section');
  var rect=hero.getBoundingClientRect();
  if(rect.top>-10&&Math.abs(dy)>40){go(dy>0?1:-1);}
  touchY=null;
},{passive:true});

window.addEventListener('keydown',function(e){
  if(e.key==='ArrowDown')go(1);
  if(e.key==='ArrowUp')go(-1);
});

function applyLang(){
  document.querySelectorAll('[data-lang]').forEach(function(el){
    el.style.display=el.dataset.lang===lang?'inline':'none';
  });
}
function setLang(l){
  lang=l;
  document.body.className=l;
  document.getElementById('btnEN').classList.toggle('active',l==='en');
  document.getElementById('btnTR').classList.toggle('active',l==='tr');
  localStorage.setItem('once_lang',l);
  applyLang();
}
setLang(localStorage.getItem('once_lang')||'en');

window.addEventListener('DOMContentLoaded',function(){
  var img=document.getElementById('limg');
  var bar=document.getElementById('lbar');
  setTimeout(function(){img.classList.add('show');},100);
  setTimeout(function(){bar.style.width='100%';},180);
  setTimeout(function(){
    document.getElementById('loader').classList.add('out');
    render();
  },1600);
});
</script>
</body>
</html>
