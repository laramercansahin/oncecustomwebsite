<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speakers — Once Custom Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#070604;
  --border:#2A2520;
  --bronze:#B08858;
  --cream:#EDE4D5;
  --mid:#B8AFA4;
  --ghost:#1E1A15;
  --radius:480px;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--cream);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease;}
#loader.out{opacity:0;visibility:hidden;pointer-events:none;}
#loader-logo{height:44px;filter:brightness(0) invert(1);opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;}
#loader-logo.show{opacity:1;transform:translateY(0);}
#lbar{position:absolute;bottom:0;left:0;height:1px;background:var(--bronze);width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1);}

/* ── TOPBAR ── */
.bar{position:fixed;top:0;left:0;right:0;z-index:200;height:80px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(7,6,4,.92);backdrop-filter:blur(20px);}
.bar-back{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:10px;transition:color .2s,gap .2s;}
.bar-back::before{content:'←';font-size:14px;}
.bar-back:hover{color:var(--bronze);gap:14px;}
.bar-logo img{height:40px;filter:brightness(0) invert(1);}
.bar-lang button{background:none;border:none;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;color:var(--mid);cursor:pointer;padding:4px 8px;transition:color .2s;}
.bar-lang button.active{color:var(--cream);}

/* ══════════════════════════════════
   ORBITAL SECTION
══════════════════════════════════ */
#orbital-section{
  position:relative;
  width:100%;
  height:100vh;
  margin-top:80px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ambient bg glow */
.orb-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 55%, rgba(176,136,88,.06) 0%, transparent 70%),
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(176,136,88,.04) 0%, transparent 60%);
  pointer-events:none;
}

/* section heading */
.orb-header{
  position:absolute;
  top:48px;left:60px;
  z-index:10;
}
.orb-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,4vw,52px);
  letter-spacing:.1em;color:var(--cream);
  line-height:1;
}
.orb-sub{
  font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ghost);margin-top:6px;
}

/* active product name + tagline center display */
.orb-active-info{
  position:absolute;
  bottom:100px;left:0;right:0;
  text-align:center;
  z-index:10;
  pointer-events:none;
}
.orb-active-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,8vw,100px);
  letter-spacing:.08em;color:var(--cream);
  line-height:1;
  transition:opacity .3s ease;
}
.orb-active-tag{
  font-size:12px;font-weight:200;font-style:italic;
  letter-spacing:.14em;color:var(--bronze);
  margin-top:8px;
  transition:opacity .3s ease;
}
.orb-active-hint{
  font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  color:var(--ghost);margin-top:14px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.orb-active-hint::before,.orb-active-hint::after{content:'';display:block;width:20px;height:1px;background:var(--ghost);}

/* navigation arrows */
.orb-nav{
  position:absolute;
  bottom:44px;left:50%;transform:translateX(-50%);
  z-index:10;
  display:flex;align-items:center;gap:32px;
}
.orb-btn{
  width:48px;height:48px;
  background:transparent;
  border:1px solid var(--border);
  color:var(--mid);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s,background .2s;
}
.orb-btn:hover{border-color:var(--bronze);color:var(--cream);}
.orb-counter{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;letter-spacing:.2em;color:var(--ghost);
  min-width:60px;text-align:center;
}
.orb-counter em{color:var(--bronze);font-style:normal;}

/* ── 3D CAROUSEL ── */
.carousel-scene{
  position:relative;
  width:100%;
  height:70vh;
  perspective:1100px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.carousel-ring{
  position:relative;
  width:1px;height:1px;
  transform-style:preserve-3d;
  transition:transform .9s cubic-bezier(.77,0,.175,1);
}

/* subtle orbit ellipse ring */
.orbit-ring{
  position:absolute;
  width:calc(var(--radius)*2 + 200px);
  height:calc(var(--radius)*2 + 200px);
  left:calc(-1*(var(--radius) + 100px));
  top:calc(-1*(var(--radius) + 100px));
  border-radius:50%;
  border:1px solid rgba(176,136,88,.08);
  pointer-events:none;
  transform:rotateX(80deg);
}

/* individual orbit item */
.orbit-item{
  position:absolute;
  width:160px;
  height:160px;
  left:-80px;top:-80px;
  transform-style:preserve-3d;
  cursor:pointer;
  transition:opacity .4s ease;
}

/* circle frame — isolation creates a new stacking context so
   multiply on the image blends against THIS bg, not the page */
.orbit-circle{
  width:100%;height:100%;
  border-radius:50%;
  border:1px solid rgba(176,136,88,.18);
  /* warm-dark bg: white pixels from JPG will multiply into this and disappear */
  background:radial-gradient(circle at 50% 40%, #1C1409 0%, #0C0905 50%, #070604 100%);
  isolation:isolate;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  overflow:hidden;
  transition:border-color .3s ease, box-shadow .3s ease, transform .3s ease;
}
.orbit-item.active .orbit-circle{
  border-color:var(--bronze);
  box-shadow:0 0 50px rgba(176,136,88,.38), 0 0 100px rgba(176,136,88,.12);
  transform:scale(1.18);
}
.orbit-item:not(.active):hover .orbit-circle{
  border-color:rgba(176,136,88,.45);
  box-shadow:0 0 20px rgba(176,136,88,.15);
}

/* product image — multiply against the circle's own dark bg:
   white pixels become dark (disappear), product silhouette glows through */
.orbit-img{
  width:82%;height:82%;
  object-fit:contain;
  mix-blend-mode:multiply;
  /* boost contrast so dark product details survive the multiply */
  filter:brightness(1.6) contrast(1.3) drop-shadow(0 4px 12px rgba(0,0,0,.8));
  transition:filter .4s ease;
  animation:orbit-float 5s ease-in-out infinite;
}
.orbit-item.active .orbit-img{
  filter:brightness(1.7) contrast(1.35) drop-shadow(0 8px 20px rgba(0,0,0,.9));
  animation-play-state:running;
}
@keyframes orbit-float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* item number badge */
.orbit-num{
  position:absolute;
  bottom:-26px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:.22em;color:var(--ghost);
  white-space:nowrap;
  transition:color .3s ease;
}
.orbit-item.active .orbit-num{color:var(--bronze);}

/* outer glow ring for active */
.orbit-glow{
  position:absolute;inset:-12px;
  border-radius:50%;
  border:1px solid rgba(176,136,88,.3);
  opacity:0;
  transition:opacity .4s ease;
  animation:glow-pulse 2.5s ease-in-out infinite;
}
.orbit-item.active .orbit-glow{opacity:1;}
@keyframes glow-pulse{
  0%,100%{transform:scale(1);opacity:.6;}
  50%{transform:scale(1.06);opacity:.2;}
}

/* ══════════════════════════════════
   SLIDER DETAIL SECTION
══════════════════════════════════ */
#hero-section{
  position:relative;
  height:100vh;
  overflow:hidden;
}
#slides{position:absolute;inset:0;}

.slide{
  position:absolute;inset:0;
  display:flex;align-items:center;
  overflow:hidden;
  transition:transform .9s cubic-bezier(.77,0,.18,1),opacity .9s ease;
}
.slide.prev{transform:translateY(-100%);opacity:0;pointer-events:none;}
.slide.active{transform:translateY(0);opacity:1;}
.slide.next{transform:translateY(100%);opacity:0;pointer-events:none;}

.slide-bg{
  position:absolute;inset:0;
}
.slide-bg-inner{
  position:absolute;inset:0;
}

.slide-ghost{
  position:absolute;right:-.04em;bottom:-.12em;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(200px,30vw,400px);
  line-height:1;letter-spacing:-.02em;
  color:rgba(255,255,255,.025);
  pointer-events:none;user-select:none;
}

.slide-content{
  position:relative;z-index:2;
  padding:0 80px;width:100%;
  display:grid;grid-template-columns:1fr 1fr;
  gap:60px;align-items:center;
}
.slide-index{
  font-size:10px;letter-spacing:.32em;color:var(--bronze);
  margin-bottom:18px;
  display:flex;align-items:center;gap:14px;
}
.slide-index::before{content:'';display:block;width:24px;height:1px;background:var(--bronze);}
.slide-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(80px,13vw,172px);
  letter-spacing:.04em;line-height:.88;color:var(--cream);
  transform:translateY(24px);opacity:0;
  transition:transform .85s cubic-bezier(.22,1,.36,1) .1s,opacity .85s ease .1s;
}
.slide.active .slide-name{transform:translateY(0);opacity:1;}
.slide-tagline{
  font-size:13px;font-weight:200;font-style:italic;
  letter-spacing:.12em;line-height:2.2;color:var(--mid);
  margin-top:22px;border-left:1px solid rgba(176,136,88,.5);padding-left:18px;
  transform:translateY(16px);opacity:0;
  transition:transform .8s ease .28s,opacity .8s ease .28s;
}
.slide.active .slide-tagline{transform:translateY(0);opacity:1;}
.slide-specs{
  display:flex;flex-direction:column;margin-top:32px;
  transform:translateY(14px);opacity:0;
  transition:transform .8s ease .38s,opacity .8s ease .38s;
}
.slide.active .slide-specs{transform:translateY(0);opacity:1;}
.spec-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.spec-row:first-child{border-top:1px solid var(--border);}
.spec-label{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--ghost);}
.spec-val{font-size:11px;letter-spacing:.08em;color:var(--mid);}
.slide-cta{
  margin-top:30px;
  transform:translateY(10px);opacity:0;
  transition:transform .8s ease .48s,opacity .8s ease .48s;
}
.slide.active .slide-cta{transform:translateY(0);opacity:1;}
.cta-btn{
  display:inline-flex;align-items:center;gap:14px;
  font-size:10px;font-weight:400;letter-spacing:.24em;text-transform:uppercase;
  color:var(--bronze);text-decoration:none;border:1px solid var(--bronze);
  padding:13px 26px;transition:background .22s,color .22s,gap .22s;
}
.cta-btn:hover{background:var(--bronze);color:var(--black);gap:20px;}
.cta-btn::after{content:'→';}

/* right side: product on stage */
.slide-right{display:flex;align-items:center;justify-content:center;position:relative;}
.slide-stage{
  position:relative;
  width:min(380px,40vw);
  aspect-ratio:1/1.1;
  border-radius:2px;
  background:radial-gradient(ellipse at 50% 40%, #E8E0D4 0%, #D4CCC0 100%);
  display:flex;align-items:center;justify-content:center;
  transform:translateY(20px);opacity:0;
  transition:transform 1s cubic-bezier(.22,1,.36,1) .12s,opacity 1s ease .12s;
  overflow:hidden;
}
.slide.active .slide-stage{transform:translateY(0);opacity:1;}
.slide.active .slide-stage-img{animation:float-stage 7s ease-in-out infinite .8s;}
@keyframes float-stage{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-14px);}
}
.slide-stage-img{
  width:85%;height:85%;
  object-fit:contain;
  filter:drop-shadow(0 16px 32px rgba(0,0,0,.22));
}
.slide-stage::after{
  content:'Once Custom';
  position:absolute;bottom:12px;right:14px;
  font-size:8px;letter-spacing:.2em;color:rgba(0,0,0,.15);
  text-transform:uppercase;
}
.slide-stage-shadow{
  position:absolute;
  bottom:-16px;left:10%;right:10%;
  height:22px;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.5) 0%,transparent 70%);
  filter:blur(6px);
}

/* back to orbit button */
.back-to-orbit{
  position:absolute;top:104px;left:48px;z-index:10;
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mid);cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:color .2s,gap .2s;
  text-decoration:none;
}
.back-to-orbit::before{content:'↑';font-size:14px;}
.back-to-orbit:hover{color:var(--bronze);gap:14px;}

/* slider controls */
.nav-arr{
  position:absolute;right:48px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:8px;
}
.arr-btn{
  width:44px;height:44px;background:rgba(7,6,4,.7);
  border:1px solid var(--border);color:var(--mid);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .2s,color .2s;
}
.arr-btn:hover{border-color:var(--bronze);color:var(--cream);}
.arr-btn:disabled{opacity:.2;cursor:default;pointer-events:none;}
.dots{
  position:absolute;left:40px;top:50%;transform:translateY(-50%);
  z-index:10;display:flex;flex-direction:column;gap:16px;
}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .3s,transform .3s;}
.dot.active{background:var(--bronze);transform:scale(1.6);}
.counter{
  position:absolute;bottom:24px;left:48px;z-index:10;
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.2em;color:var(--ghost);
}
.counter em{color:var(--bronze);font-style:normal;}
.progress{position:absolute;left:0;bottom:0;right:0;z-index:10;height:2px;background:var(--border);}
.progress-fill{height:100%;background:var(--bronze);transition:width .6s cubic-bezier(.4,0,.2,1);}

/* lang */
[data-lang]{display:none;}
body.en [data-lang="en"],body.tr [data-lang="tr"]{display:inline;}
</style>
</head>

   img:'https://www.oncecustom.com/images/urun/kare/Nar_Act_2025-v3.png'},
  {name:'DAL A+', tagline:{en:'premium pendant edition',tr:'premium sarkıt edisyonu'},
   specs:[{l:'Type',v:'Pendant / ceiling, upgraded'},{l:'Driver',v:'ScanSpeak Reference'},{l:'Sensitivity',v:'90 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/once-custom0009_Dal_Purple-v2_1.png'},
  {name:'SU 2',   tagline:{en:'the evolution of the original',tr:'orijinalin evrimi'},
   specs:[{l:'Type',v:'Desktop, 2-way evolved'},{l:'Driver',v:'ScanSpeak'},{l:'Sensitivity',v:'89 dB'},{l:'Origin',v:'Istanbul, handmade'}],
   img:'https://www.oncecustom.com/images/urun/kare/Su_2-v3.png'},
];

var N = products.length;
var orbCurrent = 0;
var orbAnimating = false;
var sliderCurrent = 0;
var sliderAnimating = false;
var lang = 'tr';

document.getElementById('orbTot').textContent = String(N).padStart(2,'0');
document.getElementById('cTot').textContent = String(N).padStart(2,'0');

/* ── BUILD ORBITAL ITEMS ── */
var ring = document.getElementById('carouselRing');
var orbItems = [];
var angleStep = 360 / N;
var R = 480; /* match --radius */

products.forEach(function(p,i){
  var item = document.createElement('div');
  item.className = 'orbit-item' + (i===0?' active':'');
  item.dataset.index = i;

  var angle = i * angleStep; /* in degrees, laid flat */
  item.style.transform = 'rotateY('+angle+'deg) translateZ('+R+'px)';

  item.innerHTML = `
    <div class="orbit-glow"></div>
    <div class="orbit-circle">
      <img class="orbit-img" src="${p.img}" alt="${p.name}" loading="${i<4?'eager':'lazy'}">
    </div>
    <div class="orbit-num">${String(i+1).padStart(2,'0')}</div>`;

  item.addEventListener('click', function(){
    var idx = parseInt(this.dataset.index);
    if(idx === orbCurrent){
      /* already active — go to detail */
      goToDetail(idx);
    } else {
      orbGoTo(idx);
    }
  });

  ring.appendChild(item);
  orbItems.push(item);
});

function orbRender(){
  /* rotate ring so current item faces front (rotateY = 0) */
  var rotation = -orbCurrent * angleStep;
  ring.style.transform = 'rotateY('+rotation+'deg)';

  orbItems.forEach(function(item,i){
    item.classList.toggle('active', i===orbCurrent);
  });

  var p = products[orbCurrent];
  document.getElementById('orbName').textContent = p.name;
  document.getElementById('orbTag').innerHTML =
    '<span data-lang="en">'+p.tagline.en+'</span><span data-lang="tr">'+p.tagline.tr+'</span>';
  document.getElementById('orbCur').textContent = String(orbCurrent+1).padStart(2,'0');
  applyLang();
}

function orbGo(dir){
  if(orbAnimating)return;
  orbCurrent = (orbCurrent + dir + N) % N;
  orbAnimating = true;
  orbRender();
  setTimeout(function(){orbAnimating=false;},950);
}
function orbGoTo(idx){
  if(orbAnimating)return;
  orbCurrent = idx;
  orbAnimating = true;
  orbRender();
  setTimeout(function(){orbAnimating=false;},950);
}

/* drag / swipe on carousel */
var dragStartX = null;
var carouselScene = document.querySelector('.carousel-scene');
carouselScene.addEventListener('mousedown',function(e){dragStartX=e.clientX;});
carouselScene.addEventListener('mouseup',function(e){
  if(dragStartX===null)return;
  var dx=e.clientX-dragStartX;
  if(Math.abs(dx)>40){orbGo(dx<0?1:-1);}
  dragStartX=null;
});
carouselScene.addEventListener('touchstart',function(e){dragStartX=e.touches[0].clientX;},{passive:true});
carouselScene.addEventListener('touchend',function(e){
  if(dragStartX===null)return;
  var dx=e.changedTouches[0].clientX-dragStartX;
  if(Math.abs(dx)>40){orbGo(dx<0?1:-1);}
  dragStartX=null;
},{passive:true});

/* ── BUILD SLIDES ── */
var slidesWrap = document.getElementById('slides');
var dotsWrap = document.getElementById('dotsWrap');

products.forEach(function(p,i){
  var s = document.createElement('div');
  s.className = 'slide '+(i===0?'active':'next');
  s.innerHTML = `
    <div class="slide-bg">
      <div class="slide-bg-inner" style="background:${bgGradients[i]};position:absolute;inset:0;"></div>
    </div>
    <div class="slide-ghost">${String(i+1).padStart(2,'0')}</div>
    <div class="slide-content">
      <div>
        <div class="slide-index">${String(i+1).padStart(2,'0')} &nbsp;·&nbsp; Once Custom Sound</div>
        <div class="slide-name">${p.name}</div>
        <div class="slide-tagline">
          <span data-lang="en">${p.tagline.en}</span>
          <span data-lang="tr">${p.tagline.tr}</span>
        </div>
        <div class="slide-specs">
          ${p.specs.map(sp=>`<div class="spec-row"><span class="spec-label">${sp.l}</span><span class="spec-val">${sp.v}</span></div>`).join('')}
        </div>
        <div class="slide-cta">
          <a href="mailto:info@oncecustom.com?subject=Enquiry: ${p.name}" class="cta-btn">
            <span data-lang="en">Enquire</span><span data-lang="tr">Bilgi Al</span>
          </a>
        </div>
      </div>
      <div class="slide-right">
        <div class="slide-stage">
          <img class="slide-stage-img" src="${p.img}" alt="${p.name}" loading="${i<2?'eager':'lazy'}">
        </div>
        <div class="slide-stage-shadow"></div>
      </div>
    </div>`;
  slidesWrap.appendChild(s);

  var d = document.createElement('div');
  d.className = 'dot'+(i===0?' active':'');
  d.onclick = (function(idx){return function(){goTo(idx);};})(i);
  dotsWrap.appendChild(d);
});

function goToDetail(idx){
  sliderCurrent = idx;
  sliderRender();
  document.getElementById('hero-section').scrollIntoView({behavior:'smooth'});
}

function sliderRender(){
  document.querySelectorAll('.slide').forEach(function(s,i){
    s.className='slide '+(i<sliderCurrent?'prev':i===sliderCurrent?'active':'next');
  });
  document.querySelectorAll('.dot').forEach(function(d,i){d.classList.toggle('active',i===sliderCurrent);});
  document.getElementById('cCur').textContent=String(sliderCurrent+1).padStart(2,'0');
  document.getElementById('progFill').style.width=((sliderCurrent+1)/N*100)+'%';
  document.getElementById('btnUp').disabled=sliderCurrent===0;
  document.getElementById('btnDown').disabled=sliderCurrent===N-1;
  applyLang();
}

function go(dir){
  if(sliderAnimating)return;
  var n=sliderCurrent+dir;
  if(n<0||n>=N)return;
  sliderAnimating=true;sliderCurrent=n;sliderRender();
  setTimeout(function(){sliderAnimating=false;},960);
}
function goTo(idx){
  if(sliderAnimating||idx===sliderCurrent)return;
  sliderAnimating=true;sliderCurrent=idx;sliderRender();
  setTimeout(function(){sliderAnimating=false;},960);
}

/* wheel in hero */
var wheelLock=false;
window.addEventListener('wheel',function(e){
  var hero=document.getElementById('hero-section');
  var rect=hero.getBoundingClientRect();
  if(rect.top>-10&&rect.bottom>=window.innerHeight*.8){
    if(wheelLock)return;
    if(e.deltaY>0&&sliderCurrent===N-1)return;
    if(e.deltaY<0&&sliderCurrent===0)return;
    e.preventDefault();
    wheelLock=true;go(e.deltaY>0?1:-1);
    setTimeout(function(){wheelLock=false;},1100);
  }
},{passive:false});

/* wheel on orbital — rotate carousel */
var orbWheelLock=false;
window.addEventListener('wheel',function(e){
  var orb=document.getElementById('orbital-section');
  var rect=orb.getBoundingClientRect();
  if(rect.top>-10&&rect.bottom>=window.innerHeight*.9){
    if(orbWheelLock)return;
    orbWheelLock=true;
    orbGo(e.deltaY>0?1:-1);
    setTimeout(function(){orbWheelLock=false;},1100);
  }
},{passive:true});

/* touch slide in hero */
var touchY=null;
window.addEventListener('touchstart',function(e){touchY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',function(e){
  if(touchY===null)return;
  var dy=touchY-e.changedTouches[0].clientY;
  var hero=document.getElementById('hero-section');
  var rect=hero.getBoundingClientRect();
  if(rect.top>-10&&Math.abs(dy)>40){go(dy>0?1:-1);}
  touchY=null;
},{passive:true});

/* keyboard */
window.addEventListener('keydown',function(e){
  var orb=document.getElementById('orbital-section');
  var hero=document.getElementById('hero-section');
  var orbRect=orb.getBoundingClientRect();
  var heroRect=hero.getBoundingClientRect();
  if(orbRect.top>-200&&orbRect.bottom>200){
    if(e.key==='ArrowRight')orbGo(1);
    if(e.key==='ArrowLeft')orbGo(-1);
    if(e.key==='Enter')goToDetail(orbCurrent);
  } else if(heroRect.top>-200){
    if(e.key==='ArrowDown')go(1);
    if(e.key==='ArrowUp')go(-1);
  }
});

/* lang */
function applyLang(){
  document.querySelectorAll('[data-lang]').forEach(function(el){
    el.style.display=el.dataset.lang===lang?'inline':'none';
  });
}
function setLang(l){
  lang=l;document.body.className=l;
  document.getElementById('btnEN').classList.toggle('active',l==='en');
  document.getElementById('btnTR').classList.toggle('active',l==='tr');
  localStorage.setItem('once_lang',l);applyLang();
}
setLang(localStorage.getItem('once_lang')||'en');

/* loader */
window.addEventListener('DOMContentLoaded',function(){
  var logo=document.getElementById('loader-logo');
  var bar=document.getElementById('lbar');
  setTimeout(function(){logo.classList.add('show');},100);
  setTimeout(function(){bar.style.width='100%';},200);
  setTimeout(function(){
    document.getElementById('loader').classList.add('out');
    orbRender();
    sliderRender();
  },1700);
});
</script>
</body>
</html>
